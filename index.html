<!doctype html>
<html lang="id">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Invoice Antrean</title>
        <style>
            :root {
                --bg: #f4f8fb;
                --card: #ffffff;
                --ink: #102027;
                --muted: #4c5b61;
                --accent: #005a78;
                --ok-bg: #e9f8ee;
                --ok: #1f7a3e;
                --warn-bg: #fff5e6;
                --warn: #a05a00;
            }
            body {
                margin: 0;
                background: radial-gradient(
                    circle at top right,
                    #d5edf5,
                    var(--bg)
                );
                font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
                color: var(--ink);
                min-height: 100vh;
                display: grid;
                place-items: center;
                padding: 20px;
            }
            .card {
                width: min(540px, 96vw);
                background: var(--card);
                border-radius: 16px;
                box-shadow: 0 14px 40px rgba(8, 38, 48, 0.14);
                overflow: hidden;
                border: 1px solid #d9e6ed;
            }
            .head {
                background: linear-gradient(135deg, #005a78, #1f7a96);
                color: #fff;
                padding: 20px;
            }
            .head h1 {
                margin: 0;
                font-size: 24px;
                letter-spacing: 0.3px;
            }
            .head p {
                margin: 6px 0 0;
                opacity: 0.95;
            }
            .content {
                padding: 20px;
                display: grid;
                gap: 12px;
            }
            .row {
                display: flex;
                justify-content: space-between;
                gap: 16px;
                border-bottom: 1px dashed #dbe7ed;
                padding-bottom: 10px;
            }
            .label {
                color: var(--muted);
            }
            .value {
                font-weight: 700;
                text-align: right;
                word-break: break-word;
            }
            .badge {
                display: inline-flex;
                border-radius: 999px;
                padding: 6px 12px;
                font-size: 13px;
                font-weight: 700;
                border: 1px solid;
                width: fit-content;
            }
            .badge-ok {
                background: var(--ok-bg);
                color: var(--ok);
                border-color: #ccead6;
            }
            .badge-warn {
                background: var(--warn-bg);
                color: var(--warn);
                border-color: #f3d7aa;
            }
            .actions {
                padding: 0 20px 20px;
                display: flex;
                gap: 10px;
                flex-wrap: wrap;
            }
            .btn {
                text-decoration: none;
                border: none;
                border-radius: 10px;
                padding: 10px 14px;
                font-size: 14px;
                font-weight: 600;
                cursor: pointer;
            }
            .btn-primary {
                background: var(--accent);
                color: #fff;
            }
            .btn-ghost {
                background: #edf4f7;
                color: #10313c;
            }
        </style>
    </head>
    <body>
        <article class="card" role="article" aria-label="Invoice antrean">
            <header class="head">
                <h1 id="title">Invoice Antrean</h1>
                <p id="subtitle">
                    Dokumen ini dibuat dari scan QR tiket antrean.
                </p>
            </header>

            <section class="content" id="content">
                <div class="row">
                    <span class="label">Nomor Antrean</span>
                    <span class="value" id="queueNumber">-</span>
                </div>
                <div class="row">
                    <span class="label">Timestamp</span>
                    <span class="value" id="issuedAt">-</span>
                </div>
                <div class="row">
                    <span class="label">Ticket ID</span>
                    <span class="value" id="ticketId">-</span>
                </div>
                <div>
                    <span class="badge badge-ok" id="badge">Terverifikasi</span>
                </div>
            </section>

            <section class="actions">
                <button class="btn btn-ghost" onclick="window.print()">
                    Print
                </button>
            </section>
        </article>

        <script>
            const params = new URLSearchParams(window.location.search);
            const status = params.get("status") || "ok";
            const title = params.get("title");
            const message = params.get("message");

            const queueNumberRaw = params.get("queueNumber");
            const queueNumber = queueNumberRaw
                ? String(queueNumberRaw).padStart(3, "0")
                : "-";

            document.getElementById("queueNumber").textContent = queueNumber;
            document.getElementById("issuedAt").textContent =
                params.get("issuedAt") || "-";
            document.getElementById("ticketId").textContent =
                params.get("ticketId") || "-";

            const badge = document.getElementById("badge");
            const verified = params.get("verified") === "true";

            if (status === "error") {
                document.getElementById("title").textContent =
                    title || "Invoice Tidak Tersedia";
                document.getElementById("subtitle").textContent =
                    message || "Terjadi masalah saat membuka invoice.";
                badge.textContent = "Perlu Perhatian";
                badge.classList.remove("badge-ok");
                badge.classList.add("badge-warn");
            } else {
                badge.textContent = verified
                    ? "Terverifikasi"
                    : "Belum Terverifikasi";
                if (!verified) {
                    badge.classList.remove("badge-ok");
                    badge.classList.add("badge-warn");
                }
            }
        </script>
    </body>
</html>
