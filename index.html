<!doctype html>
<html lang="id">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Nota Antrean</title>
        <style>
            :root {
                --paper: #fffefc;
                --ink: #232323;
                --muted: #676767;
                --line: #d4d4d4;
                --ok: #1f7a3e;
                --warn: #9a5a00;
                --bg: #eceff3;
            }
            * {
                box-sizing: border-box;
            }
            body {
                margin: 0;
                background: linear-gradient(180deg, #e3e8ef, var(--bg));
                font-family: "Courier New", Courier, monospace;
                color: var(--ink);
                min-height: 100vh;
                display: grid;
                place-items: center;
                padding: 20px;
            }
            .receipt {
                width: min(380px, 96vw);
                background: var(--paper);
                border: 1px solid var(--line);
                box-shadow: 0 16px 30px rgba(15, 25, 35, 0.2);
                position: relative;
                padding: 16px;
            }
            .receipt::before,
            .receipt::after {
                content: "";
                position: absolute;
                left: 0;
                right: 0;
                height: 8px;
                background: repeating-linear-gradient(
                    90deg,
                    transparent,
                    transparent 6px,
                    rgba(0, 0, 0, 0.08) 6px,
                    rgba(0, 0, 0, 0.08) 12px
                );
            }
            .receipt::before {
                top: -8px;
            }
            .receipt::after {
                bottom: -8px;
            }
            .center {
                text-align: center;
            }
            .logo {
                width: 68px;
                height: 68px;
                border-radius: 10px;
                object-fit: cover;
                border: 1px solid var(--line);
                display: none;
                margin: 0 auto 10px;
            }
            .merchant {
                font-weight: 700;
                font-size: 18px;
                letter-spacing: 0.4px;
                margin: 0;
            }
            .sub {
                margin: 4px 0 0;
                font-size: 12px;
                color: var(--muted);
            }
            .rule {
                border-top: 1px dashed var(--line);
                margin: 14px 0;
            }
            .queue-box {
                border: 1px dashed var(--line);
                padding: 12px;
                text-align: center;
                margin-bottom: 12px;
            }
            .queue-label {
                font-size: 12px;
                color: var(--muted);
                margin: 0;
            }
            .queue-number {
                margin: 6px 0 0;
                font-size: 42px;
                font-weight: 700;
                letter-spacing: 2px;
                line-height: 1;
            }
            .row {
                display: flex;
                justify-content: space-between;
                gap: 12px;
                font-size: 13px;
                margin: 8px 0;
            }
            .row .k {
                color: var(--muted);
            }
            .row .v {
                text-align: right;
                font-weight: 700;
                max-width: 60%;
                word-break: break-word;
            }
            .status {
                margin-top: 10px;
                font-size: 13px;
                font-weight: 700;
                text-align: center;
                padding: 8px;
                border: 1px dashed var(--line);
            }
            .status.ok {
                color: var(--ok);
            }
            .status.warn {
                color: var(--warn);
            }
            .actions {
                display: flex;
                justify-content: center;
                margin-top: 14px;
            }
            .btn {
                background: #f2f4f7;
                border: 1px solid var(--line);
                border-radius: 8px;
                padding: 8px 12px;
                font-family: inherit;
                cursor: pointer;
            }
            .footer {
                margin-top: 12px;
                text-align: center;
                color: var(--muted);
                font-size: 11px;
            }
            @media print {
                body {
                    background: #fff;
                    padding: 0;
                }
                .receipt {
                    box-shadow: none;
                    border: none;
                    width: 100%;
                }
                .actions {
                    display: none;
                }
                .receipt::before,
                .receipt::after {
                    display: none;
                }
            }
        </style>
    </head>
    <body>
        <article class="receipt" role="article" aria-label="Nota antrean">
            <header class="center">
                <img id="logo" class="logo" alt="Logo merchant" />
                <h1 id="merchantName" class="merchant">Merchant Kamu</h1>
                <p id="subtitle" class="sub">Nota antrean digital</p>
            </header>

            <div class="rule"></div>

            <section class="queue-box">
                <p class="queue-label">NOMOR ANTREAN</p>
                <p class="queue-number" id="queueNumber">-</p>
            </section>

            <section>
                <div class="row">
                    <span class="k">Tanggal/Jam</span>
                    <span class="v" id="issuedAt">-</span>
                </div>
                <div class="row">
                    <span class="k">Ticket ID</span>
                    <span class="v" id="ticketId">-</span>
                </div>
            </section>

            <div id="messageBox" class="status ok">
                Terima kasih telah berkunjung. Mohon tunggu nomor Anda
                dipanggil.
            </div>

            <p class="footer">Simpan nota ini sebagai bukti antrean</p>
        </article>

        <script>
            const params = new URLSearchParams(window.location.search);
            const status = params.get("status") || "ok";
            const title = params.get("title");
            const message = params.get("message");

            const merchantName = params.get("merchantName") || "Merchant Kamu";
            const logoUrl = params.get("logoUrl") || "";

            const queueNumberRaw = params.get("queueNumber");
            const queueNumber = queueNumberRaw
                ? String(queueNumberRaw).padStart(3, "0")
                : "-";

            document.getElementById("merchantName").textContent = merchantName;
            document.getElementById("queueNumber").textContent = queueNumber;
            document.getElementById("issuedAt").textContent =
                params.get("issuedAt") || "-";
            document.getElementById("ticketId").textContent =
                params.get("ticketId") || "-";

            const logo = document.getElementById("logo");
            if (logoUrl) {
                logo.src = logoUrl;
                logo.style.display = "block";
            }

            const subtitle = document.getElementById("subtitle");
            const messageBox = document.getElementById("messageBox");

            if (status === "error") {
                const errorTitle = title || "Invoice Tidak Tersedia";
                const errorMessage =
                    message || "Terjadi masalah saat membuka invoice.";
                subtitle.textContent = `${errorTitle} - ${errorMessage}`;
                messageBox.textContent = errorMessage;
                messageBox.classList.remove("ok");
                messageBox.classList.add("warn");
            } else {
                subtitle.textContent = "Nota antrean digital";
                messageBox.textContent = `Terima kasih telah mengambil nomor antrean di ${merchantName}. Silakan tunggu panggilan.`;
            }
        </script>
    </body>
</html>
